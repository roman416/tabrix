{% extends 'base.html' %}
{% block content %}
<div class="hero-grid">
  <section class="hero-card glass">
    <div class="hero-title-row">
      <div>
        <h2 id="activeTableTitle">Таблица не выбрана</h2>
        <span id="activeTableMeta" class="muted"></span>
      </div>
      <div id="columnBadges" class="badges"></div>
    </div>
  </section>

  <section class="hero-card glass quick-actions-card">
    <h3>Быстрые действия</h3>
    <div class="inline-form">
      <select id="sortColumn"></select>
      <select id="sortDirection">
        <option value="asc">По возрастанию</option>
        <option value="desc">По убыванию</option>
      </select>
      <button id="sortBtn">Сортировать</button>
      <button id="addRowBtn" class="ghost-btn">Добавить строку</button>
      <button id="deleteTableBtn" class="ghost-btn danger-btn">Удалить таблицу</button>
    </div>
    <div id="sortResult" class="muted"></div>
  </section>
</div>

<section class="content-card glass">
  <div class="panel-header">
    <div>
      <h3>Редактор таблицы</h3>
      <div id="previewMeta" class="muted helper-text"></div>
    </div>
    <div class="toolbar-group">
      <input id="previewSearch" type="text" placeholder="Поиск по строкам..." />
      <select id="previewPageSize">
        <option value="25">25 строк</option>
        <option value="50" selected>50 строк</option>
        <option value="100">100 строк</option>
      </select>
      <input id="gotoPageInput" type="number" min="1" placeholder="Страница" />
      <button id="gotoPageBtn" class="ghost-btn">Перейти к странице</button>
      <input id="gotoCellInput" type="text" placeholder="Ячейка, например B12" />
      <button id="gotoCellBtn" class="ghost-btn">Перейти к ячейке</button>
      <button id="reloadPreviewBtn" class="ghost-btn">Обновить</button>
    </div>
  </div>
  <div class="muted helper-text">Правка ячеек сохраняется по Enter или при уходе из ячейки. Служебный <code>__rowid__</code> нужен, потому что строки любят устраивать цирк.</div>
  <div id="previewTableWrap" class="table-wrap"></div>
  <div class="table-footer">
    <button id="prevPageBtn" class="ghost-btn">← Назад</button>
    <div id="pageInfo" class="muted">0-0</div>
    <button id="nextPageBtn" class="ghost-btn">Вперёд →</button>
  </div>
</section>

<section class="content-card glass">
  <div class="panel-header">
    <h3>Статистика по колонке</h3>
  </div>
  <div class="inline-form stats-toolbar">
    <select id="statsColumn"></select>
    <button id="statsBtn">Посчитать</button>
  </div>
  <div id="statsGrid" class="stats-grid"></div>
</section>
{% endblock %}
