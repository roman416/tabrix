{% extends 'base.html' %}
{% block content %}
<section class="content-card assistant-card glass">
  <div class="panel-header">
    <div>
      <h3>ИИ-ассистент</h3>
      <div id="activeTableMeta" class="muted helper-text"></div>
    </div>
    <div id="assistantStatus" class="muted">Всё готово, жду вопросов.</div>
  </div>
  <div id="assistantLog" class="assistant-log page-log">
    <div class="message bot">Всё готово, жду вопросов.</div>
  </div>
  <div class="assistant-controls">
    <input id="assistantInput" type="text" placeholder="Например: что в ячейке B12? или покажи статистику, где A > 100" />
    <label class="checkbox-row"><input id="useOllama" type="checkbox" checked /> использовать модель</label>
    <button id="assistantSend" class="primary-btn">Отправить</button>
  </div>
</section>
{% endblock %}
